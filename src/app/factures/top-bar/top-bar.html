<div class="top-bar-network">
  
  <div class="top-bar-status">
    <span class="status-indicator-green"></span>
    <span class="text-muted uppercase">Tor Circuit:</span>
    <span class="text-success uppercase text-glow-soft font-bold">Established</span>
  </div>

  <div class="top-bar-route text-muted uppercase">
    <span>Guard</span>
    <span class="route-arrow">→</span>
    <span>Relay</span>
    <span class="route-arrow">→</span>
    <span>Exit</span>
    <span class="route-divider">·</span>
    <span>Latency</span>
    <span class="text-foreground font-bold">412ms</span>
  </div>

  <div class="top-bar-time text-muted uppercase">
    <span>{{ time() }}</span>
  </div>

</div>
