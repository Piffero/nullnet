<section class="terminal-container">
  <div class="terminal-window">
    
    <div class="terminal-header flex items-center justify-between">
      <div class="terminal-buttons">
        <span class="dot dot-close"></span>
        <span class="dot dot-minimize"></span>
        <span class="dot dot-expand"></span>
      </div>
      <div class="terminal-title">/DEV/NULL — NULLNET SHELL</div>
      <button 
        (click)="clearAndRestart()" 
        class="terminal-reload"
        title="Reiniciar sequência"
        style="
          background: rgba(3, 45, 18, 0.3);
          border: 1px solid rgba(34, 197, 94, 0.3);
          color: #22c55e;
          padding: 4px 10px;
          font-size: 12px;
          border-radius: 4px;
          cursor: pointer;
          transition: all 0.2s ease-in-out;"
      >
        [ reload ]
      </button>
    </div>

    <div class="terminal-body">
      <div class="p-4 text-xs md:text-sm space-y-2 min-h-[260px] max-h-[400px] overflow-y-auto select-text selection:bg-primary/20">
        
        <div class="command-line">
          <span class="text-primary select-none">$</span> <span class="command"> tor --version</span>
        </div>
        <div class="log-line muted">Tor 0.4.8.10 running on Linux</div>

        <div class="command-line">
          <span class="text-primary select-none">$</span> <span class="command"> ./nullnet --init --identity=ephemeral</span>
        </div>


        @for (line of visibleLines(); track $index) {
          <div class="flex items-start gap-2">
            <span class="text-primary/50 select-none">&gt;</span>
            
            <span [class]="{
              'text-muted-foreground': line.type === 'system',
              'text-primary text-glow-soft font-bold': line.type === 'success',
              'text-warning font-semibold': line.type === 'warning',
              'text-foreground': line.type === 'command'
            }">
              {{ line.text }}
            </span>
          </div>
        }

        <div class="flex items-center gap-2 pt-1">
          <span class="text-primary select-none">~/nullnet $</span>
          <span class="h-4 w-2 bg-primary animate-pulse box-glow-soft"></span>
        </div>

      </div>
    </div>

  </div>
</section>
